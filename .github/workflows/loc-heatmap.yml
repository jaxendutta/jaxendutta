name: LOC Heatmap

on:
  schedule:
    - cron: "0 4 * * *"   # daily at 4am UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests --break-system-packages || pip install requests

      - name: Generate LOC heatmap
        env:
          GH_TOKEN: ${{ secrets.LOC_HEATMAP_TOKEN }}
          GH_USERNAME: ${{ github.repository_owner }}
          GIT_AUTHOR_EMAILS: ${{ secrets.GIT_AUTHOR_EMAILS }}
        run: python generate_loc_heatmap.py

      - name: Commit and push heatmap
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add loc_heatmap.svg
          git diff --staged --quiet || git commit -m "Update LOC heatmap"
          git push
