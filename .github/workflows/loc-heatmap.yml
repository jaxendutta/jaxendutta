name: LOC Heatmap

on:
  schedule:
    - cron: "0 4 * * *"   # daily at 4am UTC
  workflow_dispatch:

concurrency:
  group: loc-heatmap-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests --break-system-packages || pip install requests

      - name: Generate LOC heatmap (graceful retries)
        id: heatmap
        env:
          GH_TOKEN: ${{ secrets.LOC_HEATMAP_TOKEN }}
          GH_USERNAME: ${{ github.repository_owner }}
          GIT_AUTHOR_EMAILS: ${{ vars.GIT_AUTHOR_EMAILS }}
        continue-on-error: true
        run: |
          set +e
          success=0
          for i in 1 2 3; do
            echo "Attempt $i/3"
            python generate_loc_heatmap.py
            code=$?
            if [ $code -eq 0 ]; then
              success=1
              break
            fi
            sleep $((i * 20))
          done

          if [ $success -eq 1 ]; then
            echo "generated=true" >> "$GITHUB_OUTPUT"
            exit 0
          else
            echo "::warning::LOC heatmap generation failed after retries (likely transient API/runner issue)."
            echo "generated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Commit and push heatmap
        if: steps.heatmap.outputs.generated == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add loc_heatmap.svg
          git diff --staged --quiet || git commit -m "Update LOC heatmap"
          git push

      - name: No-op info
        if: steps.heatmap.outputs.generated != 'true'
        run: echo "Skipped commit because heatmap generation did not succeed this run."
